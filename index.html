<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff0080, #c80064);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.caja{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:50px;
    border-radius:25px;
    width:90%;
    max-width:700px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

h1{
    font-size:50px;
    margin-bottom:15px;
}

p{
    color:#f5f5f5;
    margin-bottom:30px;
    font-size:20px;
}

.libros{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

button{
    background:white;
    color:#ff0080;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 5px 20px rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div class="caja">
    <h1>📚 Mi Biblioteca</h1>

    <p>Explora historias, aventuras y mundos increíbles.</p>

    <div class="libros">
        <a href="libro1.html"><button>📖 Capítulo 1</button></a>
        <a href="libro2.html"><button>📚 Capítulo 2</button></a>
        <a href="libro3.html"><button>✨ Capítulo 3</button></a>
        <a href="#"><button>⭐ Favoritos</button></a>
        <a href="#"><button>🔥 Populares</button></a>
    </div>
</div>

</body>
</html>
