<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.caja{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
    font-size:45px;
    margin-bottom:15px;
}

p{
    color:#ddd;
    margin-bottom:25px;
    font-size:18px;
}

button{
    background: linear-gradient(45deg,#ffd700,#ff9900);
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

.libros{
    margin-top:25px;
}
</style>
</head>

<body>

<div class="caja">
    <h1>📚 Mi Biblioteca</h1>

    <p>Explora historias, aventuras y libros en línea.</p>

    <div class="libros">
        <a href="libro1.html">
            <button>📖 Leer Libro 1</button>
        </a>
    </div>
</div>

</body>
</html>
