<head>

    <title>Capítulo 1</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff0080, #c80064);
            color:white;
            text-align:center;
            min-height:100vh;
            padding:30px;
        }

        .menu{
            margin-bottom:30px;
        }

        .menu a{

            text-decoration:none;
            margin:15px;
            font-size:18px;
            font-weight:bold;
        }

        .menu a:hover{
            opacity:0.8;
        }

        h1{
            font-size:50px;
            margin-bottom:25px;
        }

        .contenido{
            max-width:700px;
            margin:auto;
            text-align:left;
            line-height:1.8;
            background:rgba(255,255,255,0.15);

            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            font-size:20px;
        }

        button{
            margin-top:30px;
            padding:15px 30px;
            border:none;
            border-radius:30px;
            background:white;
            color:#ff0080;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.08);
        }
